<!DOCTYPE html>
<html lang="{{ page.lang }}" dir="{{ page.text_direction }}">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ page.title }}</title>
<style>
body { font-family: system-ui, sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; line-height: 1.8; }
html[dir="rtl"] body { direction: rtl; text-align: right; }
html[dir="ltr"] body { direction: ltr; text-align: left; }
</style>
</head>
<body dir="{{ page.text_direction }}">
{{ content }}
</body>
</html>
